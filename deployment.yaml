apiVersion: apps/v1
kind: Deployment

metadata:
  name: devops-python-app

spec:

  replicas: 2

  selector:
    matchLabels:
      app: devops-python-app

  template:

    metadata:
      labels:
        app: devops-python-app

    spec:

      containers:

      - name: python-app

        image: devops-python-app:VERSION

        imagePullPolicy: Never

        ports:

        - containerPort: 5000

        readinessProbe:

          httpGet:

            path: /

            port: 5000

          initialDelaySeconds: 5

          periodSeconds: 5